services:
  server:
    build:
      context: .
      dockerfile: infrastructure/docker/server.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
